<div class="container mt-5" style="max-width: 450px">
  <div class="card shadow">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Login</h3>
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </form>
      <div class="mt-3 text-center">
        <a routerLink="/forgot-password" class="text-decoration-none">Forgot Password?</a>
      </div>
      <div class="mt-2 text-center">
        <span>Don't have an account? </span><a routerLink="/register" class="text-decoration-none">Register</a>
      </div>
      @if (error) {
        <div class="alert alert-danger mt-3">{{ error }}</div>
      }
      <!-- <div class="mt-4 pt-3 border-top">
        <small class="text-muted d-block mb-1">Test Credentials:</small>
        <small class="text-muted d-block">Admin: admin@gmail.com / admin123</small>
        <small class="text-muted d-block">Owner/Customer: register a new account</small>
      </div> -->
    </div>
  </div>
</div>
