<div class="container mt-5" style="max-width: 450px">
  <div class="card shadow">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Create Account</h3>
      <form #regForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" [(ngModel)]="model.name" name="name" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="model.email" name="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-control" [(ngModel)]="model.phone" name="phone" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="model.password" name="password" required minlength="4" />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required />
        </div>
        <div class="mb-3">
          <label class="form-label">I want to register as</label>
          <select class="form-select" [(ngModel)]="model.role" name="role">
            <option value="CUSTOMER">Customer</option>
            <option value="HOTEL_OWNER">Hotel Owner</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          {{ loading ? 'Creating Account...' : 'Register' }}
        </button>
      </form>
      <div class="mt-3 text-center">
        <span>Already have an account? </span><a routerLink="/login" class="text-decoration-none">Login</a>
      </div>
      @if (message) {
        <div class="alert alert-success mt-3">{{ message }}</div>
      }
      @if (error) {
        <div class="alert alert-danger mt-3">{{ error }}</div>
      }
    </div>
  </div>
</div>
