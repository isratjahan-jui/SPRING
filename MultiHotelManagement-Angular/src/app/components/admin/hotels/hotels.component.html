<h2>Manage Hotels</h2>
<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Name</th><th>Owner</th><th>Status</th><th>Price</th></tr>
  </thead>
  <tbody>
    @for (h of hotels; track h.id) {
      <tr>
        <td>{{ h.id }}</td>
        <td>{{ h.hotelName }}</td>
        <td>{{ h.ownerId }}</td>
        <td><span class="badge" [class.bg-success]="h.status==='APPROVED'" [class.bg-warning]="h.status!=='APPROVED'">{{ h.status }}</span></td>
        <td>\${{ h.pricePerNight }}</td>
      </tr>
    } @empty {
      <tr><td colspan="5" class="text-muted text-center">No hotels</td></tr>
    }
  </tbody>
</table>
<div class="alert alert-info mt-3">
  <strong>Note:</strong> Admin hotel approval requires a backend endpoint to update hotel status. Currently viewing approved hotels only.
</div>
