<div class="container-fluid p-0">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" routerLink="/">MultiHotel</a>
    <div class="ms-auto">
      <a routerLink="/login" class="btn btn-outline-light btn-sm">Login</a>
    </div>
  </nav>

  <div class="container my-4">
    <h2>Hotels in {{ city }}</h2>
    <div class="row mt-4">
      @for (hotel of hotels; track hotel.id) {
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <img [src]="'http://localhost:8085/' + hotel.image" class="card-img-top" style="height:200px;object-fit:cover" alt="" />
            <div class="card-body">
              <h5>{{ hotel.hotelName }}</h5>
              <p class="text-muted">{{ hotel.address }}</p>
              <p class="fw-bold text-primary">\${{ hotel.pricePerNight }}/night</p>
              <a [routerLink]="['/hotels', hotel.id]" class="btn btn-outline-primary w-100">View</a>
            </div>
          </div>
        </div>
      } @empty {
        <p class="text-muted">No hotels found in this city.</p>
      }
    </div>
  </div>
</div>
