<h2>My Dashboard</h2>
<p class="text-muted">Welcome, {{ auth.userName() }}!</p>
<div class="row mt-4">
  <div class="col-md-4 mb-3">
    <div class="card text-bg-primary">
      <div class="card-body"><h5>My Bookings</h5><h3>{{ bookings.length }}</h3></div>
    </div>
  </div>
  <div class="col-md-4 mb-3">
    <div class="card text-bg-success">
      <div class="card-body"><h5>Wishlist</h5><h3>{{ wishlistCount }}</h3></div>
    </div>
  </div>
</div>
<div class="mt-3">
  <a routerLink="/customer/bookings" class="btn btn-primary me-2">View Bookings</a>
  <a routerLink="/customer/wishlist" class="btn btn-outline-primary me-2">Wishlist</a>
  <a routerLink="/home" class="btn btn-outline-secondary">Browse Hotels</a>
</div>
