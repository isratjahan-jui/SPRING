<h2>My Wishlist</h2>
<div class="row">
  @for (item of items; track item.id) {
    <div class="col-md-4 mb-3">
      <div class="card">
        <img [src]="'http://localhost:8085/' + item.hotelImage" class="card-img-top" style="height:150px;object-fit:cover" alt="" />
        <div class="card-body">
          <h5>{{ item.hotelName }}</h5>
          <p class="text-primary fw-bold">\${{ item.hotelPrice }}</p>
          <a [routerLink]="['/hotels', item.hotelId]" class="btn btn-sm btn-outline-primary me-1">View</a>
          <button class="btn btn-sm btn-danger" (click)="remove(item.id)">Remove</button>
        </div>
      </div>
    </div>
  } @empty {
    <p class="text-muted">Your wishlist is empty. <a routerLink="/home">Browse hotels</a></p>
  }
</div>
