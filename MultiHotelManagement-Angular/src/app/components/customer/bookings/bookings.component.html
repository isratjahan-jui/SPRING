<h2>My Bookings</h2>
<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Hotel</th><th>Check-in</th><th>Check-out</th><th>Guests</th><th>Total</th><th>Status</th></tr>
  </thead>
  <tbody>
    @for (b of bookings; track b.id) {
      <tr>
        <td>{{ b.id }}</td>
        <td>{{ b.hotelId }}</td>
        <td>{{ b.checkInDate | date }}</td>
        <td>{{ b.checkOutDate | date }}</td>
        <td>{{ b.totalGuests }}</td>
        <td>\${{ b.totalAmount }}</td>
        <td><span class="badge" [class.bg-success]="b.status==='CONFIRMED'" [class.bg-warning]="b.status==='PENDING'">{{ b.status }}</span></td>
      </tr>
    } @empty {
      <tr><td colspan="7" class="text-muted text-center">No bookings yet. <a routerLink="/home">Browse hotels</a></td></tr>
    }
  </tbody>
</table>
