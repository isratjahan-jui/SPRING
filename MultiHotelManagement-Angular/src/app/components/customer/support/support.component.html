<h2>Support Tickets</h2>

<div class="card card-body mb-4" style="max-width:500px">
  <h5>New Ticket</h5>
  <div class="mb-2">
    <input class="form-control" placeholder="Subject" [(ngModel)]="newTicket.subject" />
  </div>
  <div class="mb-2">
    <textarea class="form-control" placeholder="Describe your issue..." [(ngModel)]="newTicket.description" rows="3"></textarea>
  </div>
  <button class="btn btn-primary" (click)="createTicket()">Submit</button>
</div>

<table class="table table-bordered">
  <thead class="table-dark"><tr><th>Subject</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>
    @for (t of tickets; track t.id) {
      <tr>
        <td>{{ t.subject }}</td>
        <td><span class="badge" [class.bg-success]="t.status==='CLOSED'" [class.bg-warning]="t.status==='OPEN'">{{ t.status }}</span></td>
        <td>
          @if (t.status !== 'CLOSED') {
            <button class="btn btn-sm btn-secondary" (click)="closeTicket(t.id)">Close</button>
          }
        </td>
      </tr>
    } @empty {
      <tr><td colspan="3" class="text-muted text-center">No tickets</td></tr>
    }
  </tbody>
</table>
