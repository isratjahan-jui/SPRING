<h2>Gallery</h2>
<div class="mb-3">
  <label class="form-label">Select Hotel</label>
  <select class="form-select" [(ngModel)]="selectedHotelId" (change)="loadGallery()">
    <option value="">-- Choose --</option>
    @for (h of hotels; track h.id) {
      <option [value]="h.id">{{ h.hotelName }}</option>
    }
  </select>
</div>

@if (selectedHotelId) {
  <div class="card card-body mb-4">
    <h5>Upload Images</h5>
    <div class="row">
      <div class="col-md-6 mb-2">
        <select class="form-select" [(ngModel)]="category">
          <option value="GENERAL">General</option>
          <option value="EXTERIOR">Exterior</option>
          <option value="INTERIOR">Interior</option>
          <option value="ROOM">Room</option>
          <option value="FOOD">Food</option>
        </select>
      </div>
      <div class="col-md-6 mb-2">
        <input class="form-control" type="file" multiple (change)="onFilesSelect($event)" accept="image/*" />
      </div>
    </div>
    <button class="btn btn-primary mt-2" (click)="upload()" [disabled]="!selectedFiles.length">Upload</button>
  </div>

  <div class="row">
    @for (img of images; track img.id) {
      <div class="col-md-3 mb-3">
        <div class="card">
          <img [src]="'http://localhost:8085/' + img.image" class="card-img-top" style="height:150px;object-fit:cover" alt="" />
          <div class="card-body p-2">
            <span class="badge bg-secondary">{{ img.category }}</span>
            <button class="btn btn-sm btn-danger float-end" (click)="deleteImage(img.id)">&times;</button>
          </div>
        </div>
      </div>
    } @empty {
      <p class="text-muted">No images uploaded yet</p>
    }
  </div>
}
