<h2>My Hotels</h2>
<button class="btn btn-primary mb-3" data-bs-toggle="collapse" data-bs-target="#addHotelForm">+ Add Hotel</button>

<div class="collapse card card-body mb-4" id="addHotelForm">
  <h5>New Hotel</h5>
  <form #form="ngForm" (ngSubmit)="createHotel()">
    <div class="row">
      <div class="col-md-6 mb-2"><input class="form-control" placeholder="Hotel Name" [(ngModel)]="newHotel.hotelName" name="name" required /></div>
      <div class="col-md-6 mb-2"><input class="form-control" placeholder="Address" [(ngModel)]="newHotel.address" name="address" required /></div>
      <div class="col-md-6 mb-2"><input class="form-control" placeholder="Description" [(ngModel)]="newHotel.description" name="desc" /></div>
      <div class="col-md-3 mb-2"><input class="form-control" type="number" placeholder="Price/Night" [(ngModel)]="newHotel.pricePerNight" name="price" /></div>
      <div class="col-md-3 mb-2"><input class="form-control" placeholder="Rating" [(ngModel)]="newHotel.rating" name="rating" /></div>
      <div class="col-md-3 mb-2">
        <label><input type="checkbox" [(ngModel)]="newHotel.foodAvailable" name="food" /> Food Available</label>
      </div>
      <div class="col-md-3 mb-2"><input class="form-control" placeholder="Food Hours" [(ngModel)]="newHotel.foodServiceHours" name="foodHours" /></div>
      <div class="col-md-3 mb-2"><input class="form-control" type="number" placeholder="Location ID" [(ngModel)]="newHotel.locationId" name="locId" /></div>
    </div>
    <button type="submit" class="btn btn-success mt-2">Save</button>
  </form>
</div>

<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Name</th><th>Status</th><th>Price</th><th>Actions</th></tr>
  </thead>
  <tbody>
    @for (h of hotels; track h.id) {
      <tr>
        <td>{{ h.id }}</td>
        <td>{{ h.hotelName }}</td>
        <td><span class="badge" [class.bg-success]="h.status==='APPROVED'" [class.bg-warning]="h.status!=='APPROVED'">{{ h.status }}</span></td>
        <td>\${{ h.pricePerNight }}</td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteHotel(h.id)">Delete</button>
        </td>
      </tr>
    } @empty {
      <tr><td colspan="5" class="text-muted">No hotels yet</td></tr>
    }
  </tbody>
</table>
