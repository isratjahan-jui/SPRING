<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Rooms</h2>
  @if (selectedHotelId) {
    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#addRoomForm">+ Add Room</button>
  }
</div>

<div class="mb-3">
  <label class="form-label">Select Hotel</label>
  <select class="form-select" [(ngModel)]="selectedHotelId" (change)="onHotelChange()">
    <option value="">-- Choose a Hotel --</option>
    @for (h of hotels; track h.id) {
      <option [value]="h.id">{{ h.hotelName }}</option>
    }
  </select>
</div>

<div class="collapse card card-body mb-4" id="addRoomForm">
  <h5>{{ editingRoom ? 'Edit Room' : 'New Room' }}</h5>
  <form #form="ngForm" (ngSubmit)="saveRoom()">
    <div class="row">
      <div class="col-md-4 mb-2">
        <input class="form-control" placeholder="Room Type" [(ngModel)]="formData.roomType" name="roomType" required />
      </div>
      <div class="col-md-2 mb-2">
        <input class="form-control" type="number" placeholder="Total Rooms" [(ngModel)]="formData.totalRooms" name="totalRooms" />
      </div>
      <div class="col-md-2 mb-2">
        <input class="form-control" type="number" placeholder="Adults" [(ngModel)]="formData.adults" name="adults" />
      </div>
      <div class="col-md-2 mb-2">
        <input class="form-control" type="number" placeholder="Children" [(ngModel)]="formData.children" name="children" />
      </div>
      <div class="col-md-2 mb-2">
        <input class="form-control" type="number" step="0.01" placeholder="Price/Night" [(ngModel)]="formData.pricePerNight" name="price" />
      </div>
      <div class="col-md-6 mb-2">
        <input class="form-control" placeholder="Amenities (comma separated)" [(ngModel)]="formData.amenities" name="amenities" />
      </div>
      <div class="col-md-6 mb-2">
        <input class="form-control" placeholder="Description" [(ngModel)]="formData.description" name="description" />
      </div>
      <div class="col-md-4 mb-2">
        <input class="form-control" type="file" (change)="onFileSelect($event)" accept="image/*" />
      </div>
    </div>
    <button type="submit" class="btn btn-success mt-2">{{ editingRoom ? 'Update' : 'Save' }}</button>
    @if (editingRoom) {
      <button type="button" class="btn btn-secondary mt-2 ms-2" (click)="cancelEdit()">Cancel</button>
    }
  </form>
</div>

<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr><th>Type</th><th>Price/Night</th><th>Total</th><th>Available</th><th>Booked</th><th>Actions</th></tr>
  </thead>
  <tbody>
    @for (r of rooms; track r.id) {
      <tr>
        <td>{{ r.roomType }}</td>
        <td>\${{ r.pricePerNight }}</td>
        <td>{{ r.totalRooms }}</td>
        <td>{{ r.availableRooms }}</td>
        <td>{{ r.bookedRooms }}</td>
        <td>
          <button class="btn btn-sm btn-info me-1" (click)="editRoom(r)">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="deleteRoom(r.id)">Delete</button>
        </td>
      </tr>
    } @empty {
      <tr><td colspan="6" class="text-muted text-center">No rooms</td></tr>
    }
  </tbody>
</table>
