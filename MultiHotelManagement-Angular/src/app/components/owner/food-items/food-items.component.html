<h2>Food Items</h2>
<div class="mb-3">
  <label class="form-label">Select Hotel</label>
  <select class="form-select" [(ngModel)]="selectedHotelId" (change)="loadItems()">
    <option value="">-- Choose --</option>
    @for (h of hotels; track h.id) {
      <option [value]="h.id">{{ h.hotelName }}</option>
    }
  </select>
</div>

@if (selectedHotelId) {
  <button class="btn btn-primary mb-3" data-bs-toggle="collapse" data-bs-target="#addFoodForm">+ Add Food Item</button>

  <div class="collapse card card-body mb-4" id="addFoodForm">
    <div class="row">
      <div class="col-md-4 mb-2"><input class="form-control" placeholder="Name" [(ngModel)]="form.name" /></div>
      <div class="col-md-2 mb-2"><input class="form-control" type="number" placeholder="Price" [(ngModel)]="form.price" /></div>
      <div class="col-md-3 mb-2"><input class="form-control" placeholder="Category" [(ngModel)]="form.category" /></div>
      <div class="col-md-3 mb-2"><input class="form-control" placeholder="Description" [(ngModel)]="form.description" /></div>
    </div>
    <button class="btn btn-success" (click)="addItem()">Save</button>
  </div>

  <table class="table table-bordered">
    <thead class="table-dark"><tr><th>Name</th><th>Price</th><th>Category</th><th>Action</th></tr></thead>
    <tbody>
      @for (item of items; track item.id) {
        <tr>
          <td>{{ item.name }}</td>
          <td>\${{ item.price }}</td>
          <td>{{ item.category }}</td>
          <td><button class="btn btn-sm btn-danger" (click)="deleteItem(item.id)">Delete</button></td>
        </tr>
      } @empty {
        <tr><td colspan="4" class="text-muted text-center">No food items</td></tr>
      }
    </tbody>
  </table>
}
