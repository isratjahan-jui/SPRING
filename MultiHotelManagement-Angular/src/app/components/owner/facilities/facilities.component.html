<h2>Facilities</h2>
<div class="mb-3">
  <label class="form-label">Select Hotel</label>
  <select class="form-select" [(ngModel)]="selectedHotelId" (change)="loadFacilities()">
    <option value="">-- Choose --</option>
    @for (h of hotels; track h.id) {
      <option [value]="h.id">{{ h.hotelName }}</option>
    }
  </select>
</div>

@if (selectedHotelId) {
  <div class="mb-3">
    <div class="input-group">
      <input class="form-control" placeholder="New facility name" [(ngModel)]="newFacilityName" />
      <input class="form-control" placeholder="Description (optional)" [(ngModel)]="newFacilityDesc" />
      <button class="btn btn-primary" (click)="addFacility()">Add</button>
    </div>
  </div>

  <ul class="list-group">
    @for (f of facilities; track f.id) {
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ f.name }} <span class="text-muted small">{{ f.description }}</span>
        <button class="btn btn-sm btn-danger" (click)="deleteFacility(f.id)">&times;</button>
      </li>
    } @empty {
      <li class="list-group-item text-muted">No facilities added</li>
    }
  </ul>
}
