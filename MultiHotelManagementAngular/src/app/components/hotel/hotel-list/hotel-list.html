<div class="container mt-4">
  <h2>All Hotels</h2>
  <div class="row">
    @for (hotel of hotels; track hotel.id) {
      <div class="col-md-4 mb-3">
        <div class="card h-100">
          @if (hotel.image) {
            <img
              [src]="'http://localhost:8085/hotel/' + hotel.image"
              class="card-img-top"
              alt="{{ hotel.hotelName }}"
              style="height: 180px; object-fit: cover"
            />
          }
          <div class="card-body">
            <h5 class="card-title">{{ hotel.hotelName }}</h5>
            <p class="card-text text-muted">{{ hotel.address }}</p>
            @if (hotel.locationName) {
              <p class="card-text">
                <small class="text-muted">{{ hotel.locationName }}</small>
              </p>
            }
            <a [routerLink]="['/hotels', hotel.id]" class="btn btn-sm btn-outline-primary mt-2"
              >View Details</a
            >
          </div>
        </div>
      </div>
    }
  </div>
</div>
