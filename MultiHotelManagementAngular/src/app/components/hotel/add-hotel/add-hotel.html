<div class="container mt-4">
  <h2>Add Hotel</h2>
  <form (ngSubmit)="saveHotel()">
    <div class="mb-2">
      <label class="form-label">Hotel Name</label>
      <input
        [(ngModel)]="hotel.hotelName"
        name="hotelName"
        placeholder="Hotel Name"
        class="form-control"
        required
      />
    </div>
    <div class="mb-2">
      <label class="form-label">Address</label>
      <input
        [(ngModel)]="hotel.address"
        name="address"
        placeholder="Address"
        class="form-control"
        required
      />
    </div>
    <div class="mb-2">
      <label class="form-label">Description</label>
      <textarea
        [(ngModel)]="hotel.description"
        name="description"
        placeholder="Description"
        class="form-control"
      ></textarea>
    </div>
    <div class="mb-2">
      <label class="form-label">Rating</label>
      <input [(ngModel)]="hotel.rating" name="rating" placeholder="Rating" class="form-control" />
    </div>
    <div class="mb-2">
      <label class="form-label">Hotel Image</label>
      <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)" />
    </div>
    @if (preview) {
      <div class="mb-2 text-center">
        <img [src]="preview" class="img-thumbnail mt-2" width="200" />
      </div>
    }
    <div class="mb-2">
      <label class="form-label">Location</label>
      @if (locations.length === 0) {
        <div class="alert alert-warning">
          No locations available. Please add locations first via the backend API.
        </div>
      }
      <select [(ngModel)]="hotel.locationId" name="locationId" class="form-select" required>
        <option [ngValue]="0" disabled>Select Location</option>
        @for (loc of locations; track loc.id) {
          <option [ngValue]="loc.id">{{ loc.locationName }} - {{ loc.city }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-success" [disabled]="!hotel.locationId">Save</button>
  </form>
</div>
