<div class="container py-4">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="bi bi-person-workspace"></i>
                Hotel Owner Management
            </h3>
        </div>

        <div class="card-body">

            <form (ngSubmit)="saveOwner()">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control" [(ngModel)]="owner.name" name="name"
                            placeholder="Enter Owner Name" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" [(ngModel)]="owner.email" name="email"
                            placeholder="Enter Email" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Phone</label>
                        <input type="text" class="form-control" [(ngModel)]="owner.phone" name="phone"
                            placeholder="Enter Phone">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Address</label>
                        <input type="text" class="form-control" [(ngModel)]="owner.address" name="address"
                            placeholder="Enter Address">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Gender</label>

                        <select class="form-select" [(ngModel)]="owner.gender" name="gender">

                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>

                        </select>

                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">
                            Date of Birth
                        </label>

                        <input type="date" class="form-control" [(ngModel)]="owner.dateOfBirth" name="dateOfBirth">
                    </div>



                    <div class="row mt-3">

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Password
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>

                                <input type="password" class="form-control" name="password" [(ngModel)]="owner.password"
                                    placeholder="Enter Password" required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Confirm Password
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-shield-lock-fill"></i>
                                </span>

                                <input type="password" class="form-control" name="confirmPassword"
                                    [(ngModel)]="confirmPassword" placeholder="Confirm Password" required>

                            </div>

                            <small class="text-danger" *ngIf="confirmPassword && owner.password !== confirmPassword">

                                Password does not match

                            </small>

                            <small class="text-success" *ngIf="confirmPassword && owner.password === confirmPassword">

                                Password matched

                            </small>

                        </div>

                    </div>

                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Image URL</label>

                    <input type="text" class="form-control" [(ngModel)]="owner.image" name="image"
                        placeholder="Image URL">
                </div>

                <div class="mt-4">

                    <button class="btn btn-success" type="submit">
                        Save Hotel Owner
                    </button>

                    <button class="btn btn-secondary" type="button" (click)="resetForm()">

                        Reset

                    </button>

                </div>

            </form>

        </div>

    </div>



</div>
