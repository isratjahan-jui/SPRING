<div class="container py-4">

  <div class="row">

    <!-- Profile Card -->
    <div class="col-lg-4 mb-4">

      <div class="card shadow border-0 rounded-4">

        <div class="card-body text-center">

          <img *ngIf="owner?.image; else defaultImage" [src]="imageUrl + owner?.image"
            class="rounded-circle border shadow mb-3" width="150" height="150" />

          <ng-template #defaultImage>
            <img src="assets/images/user.png" class="rounded-circle border shadow mb-3" width="150" height="150" />
          </ng-template>

          <h3>{{owner?.name}}</h3>

          <p class="text-muted">
            Hotel Owner
          </p>

          <span class="badge bg-success px-3 py-2">
            Active
          </span>

        </div>

      </div>

    </div>

    <!-- Information -->
    <div class="col-lg-8">

      <div class="card shadow border-0 rounded-4">

        <div class="card-header bg-primary text-white">

          <h4 class="mb-0">
            Owner Information
          </h4>

        </div>

        <div class="card-body">

          <div class="row">

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Full Name</label>

              <div class="form-control bg-light">
                {{owner?.name}}
              </div>

            </div>

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Email</label>

              <div class="form-control bg-light">
                {{owner?.email}}
              </div>

            </div>

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Phone</label>

              <div class="form-control bg-light">
                {{owner?.phone}}
              </div>

            </div>

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Gender</label>

              <div class="form-control bg-light">
                {{owner?.gender}}
              </div>

            </div>

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Date of Birth</label>

              <div class="form-control bg-light">
                {{owner?.dateOfBirth}}
              </div>

            </div>

            <div class="col-md-6 mb-3">

              <label class="fw-bold">Address</label>

              <div class="form-control bg-light">
                {{owner?.address}}
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Dashboard Cards -->

  <div class="row mt-4">

    <div class="col-md-3">

      <div class="card shadow border-0 bg-primary text-white">

        <div class="card-body text-center">

          <h2>0</h2>

          <!-- <h6>Add Hotels</h6> -->
          <h6>
            <a routerLink="/hotels/add" class="text-white fw-bold">Add Hotels</a>
          </h6>


        </div>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card shadow border-0 bg-primary text-white">

        <div class="card-body text-center">

          <h2>0</h2>

          <h6>
             <a routerLink="/owner/my-hotels" class="text-white fw-bold">Total Hotels</a>
            </h6>
          

        </div>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card shadow border-0 bg-success text-white">

        <div class="card-body text-center">

          <h2>0</h2>

          <h6>Total Rooms</h6>

        </div>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card shadow border-0 bg-warning text-dark">

        <div class="card-body text-center">

          <h2>0</h2>

          <h6>Bookings</h6>

        </div>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card shadow border-0 bg-danger text-white">

        <div class="card-body text-center">

          <h2>0</h2>

          <h6>Revenue</h6>

        </div>

      </div>

    </div>

  </div>

</div>
