@if (isDashboard) {
  <header class="dashboard-header">
    <div class="header-left">
      <h6 class="page-title mb-0">{{ pageTitle }}</h6>
    </div>
    <div class="header-right">
      @if (isLoggedIn) {
        <app-notification-dropdown />
        <div class="user-menu">
          <div class="user-avatar">{{ userInitial }}</div>
          <div class="dropdown">
            <button class="user-info dropdown-toggle" data-bs-toggle="dropdown">
              <span class="user-name">{{ userName }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <span class="dropdown-item-text small text-muted">{{ role }}</span>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item text-danger" href="#" (click)="logout()">Logout</a></li>
            </ul>
          </div>
        </div>
      }
    </div>
  </header>
} @else {
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" routerLink="/">TripNest</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" routerLink="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/hotels">Hotels</a></li>
      </ul>
      @if (isLoggedIn) {
        <div class="d-flex align-items-center gap-3">
          <a class="btn btn-outline-light btn-sm" [routerLink]="dashboardRoute">Dashboard</a>
          <app-notification-dropdown />
          <div class="dropdown">
            <button class="user-pill dropdown-toggle" data-bs-toggle="dropdown">
              <div class="user-avatar-sm">{{ userInitial }}</div>
              <span class="user-email">{{ userName }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <span class="dropdown-item-text small text-muted">{{ role }}</span>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" [routerLink]="dashboardRoute">Dashboard</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item text-danger" href="#" (click)="logout()">Logout</a></li>
            </ul>
          </div>
        </div>
      } @else {
        <div class="d-flex">
          <a routerLink="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
          <a routerLink="/register" class="btn btn-primary btn-sm">Register</a>
        </div>
      }
    </div>
  </nav>
}
