<div class="notification-wrapper">
  <button class="notification-bell" (click)="toggle()">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>
    @if (unreadCount() > 0) {
      <span class="badge">{{ unreadCount() }}</span>
    }
  </button>

  @if (isOpen()) {
    <div class="dropdown-backdrop" (click)="close()"></div>
    <div class="dropdown">
      <div class="dropdown-header">
        <span>Notifications</span>
        @if (unreadCount() > 0) {
          <button class="mark-all-read" (click)="markAllAsRead()">Mark all read</button>
        }
      </div>
      <div class="dropdown-body">
        @if (notifications().length === 0) {
          <div class="empty">No notifications</div>
        }
        @for (n of notifications(); track n.id) {
          <div class="notification-item" [class.unread]="!n.readStatus" (click)="markAsRead(n.id)">
            <div class="notif-content">
              <p>{{ n.message }}</p>
              <small>{{ n.createdAt | date: 'short' }}</small>
            </div>
            <button class="delete-btn" (click)="delete(n.id, $event)" title="Dismiss">
              &times;
            </button>
          </div>
        }
      </div>
    </div>
  }
</div>
