<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg border-0">

<div class="card-header bg-primary text-white">

<h3 class="text-center">

Customer Registration

</h3>

</div>

<div class="card-body">

<form (ngSubmit)="register()">

<div class="row g-3">

<div class="col-md-12">

<label>Full Name</label>

<input
class="form-control"
[(ngModel)]="dto.name"
name="name"
required>

</div>

<div class="col-md-6">

<label>Email</label>

<input
type="email"
class="form-control"
[(ngModel)]="dto.email"
name="email"
required>

</div>

<div class="col-md-6">

<label>Phone</label>

<input
class="form-control"
[(ngModel)]="dto.phone"
name="phone"
required>

</div>

<div class="col-md-6">

<label>Password</label>

<input
type="password"
class="form-control"
[(ngModel)]="dto.password"
name="password"
required>

</div>

<div class="col-md-6">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
[(ngModel)]="confirmPassword"
name="confirmPassword"
required>

<div
class="text-danger mt-1"
*ngIf="confirmPassword && dto.password!=confirmPassword">

Password doesn't match

</div>

</div>

<div class="col-md-12 text-center mt-3">

<button
class="btn btn-primary px-5"
[disabled]="dto.password!=confirmPassword">

Register

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
