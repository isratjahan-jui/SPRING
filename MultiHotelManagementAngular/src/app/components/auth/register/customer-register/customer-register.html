<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0">

<div class="card-header bg-primary text-white">

<h3 class="text-center">

Customer Registration

</h3>

</div>

<div class="card-body">

<form (ngSubmit)="register()">

<div class="row g-3">

<div class="col-md-6">

<label>Name</label>

<input
class="form-control"
[(ngModel)]="customer.name"
name="name"
required>

</div>

<div class="col-md-6">

<label>Customer Name</label>

<input
class="form-control"
[(ngModel)]="customer.customerName"
name="customerName"
required>

</div>

<div class="col-md-6">

<label>Email</label>

<input
type="email"
class="form-control"
[(ngModel)]="customer.email"
name="email"
required>

</div>

<div class="col-md-6">

<label>Phone</label>

<input
class="form-control"
[(ngModel)]="customer.phone"
name="phone">

</div>

<div class="col-md-6">

<label>Password</label>

<input
type="password"
class="form-control"
[(ngModel)]="customer.password"
name="password"
required>

</div>

<div class="col-md-6">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
[(ngModel)]="confirmPassword"
name="confirmPassword"
required>

<div
class="text-danger mt-1"
*ngIf="confirmPassword && customer.password!=confirmPassword">

Password doesn't match

</div>

</div>

<div class="col-md-6">

<label>Gender</label>

<select
class="form-select"
[(ngModel)]="customer.gender"
name="gender">

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6">

<label>Date of Birth</label>

<input
type="date"
class="form-control"
[(ngModel)]="customer.dateOfBirth"
name="dateOfBirth">

</div>

<div class="col-md-12">

<label>Address</label>

<textarea
rows="3"
class="form-control"
[(ngModel)]="customer.address"
name="address">

</textarea>

</div>

<div class="col-md-12">

<label>Profile Image</label>

<input
type="file"
class="form-control"
accept="image/*"
(change)="onFileSelected($event)">

</div>

<div
class="col-md-12 text-center"
*ngIf="preview">

<img
[src]="preview"
class="img-thumbnail mt-3"
width="180">

</div>

<div class="col-md-12 text-center mt-3">

<button
class="btn btn-primary px-5"
[disabled]="customer.password!=confirmPassword">

Register

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
