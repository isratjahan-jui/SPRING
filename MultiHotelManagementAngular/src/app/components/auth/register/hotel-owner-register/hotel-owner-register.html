<div class="container py-4">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">
        Hotel Owner Registration
      </h3>
    </div>

    <div class="card-body">
      <form (ngSubmit)="saveOwner()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Full Name</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="dto.name"
              name="name"
              placeholder="Enter Owner Name"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">Email</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="dto.email"
              name="email"
              placeholder="Enter Email"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-bold">Phone</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="dto.phone"
              name="phone"
              placeholder="Enter Phone"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              name="password"
              [(ngModel)]="dto.password"
              placeholder="Enter Password"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              placeholder="Confirm Password"
              required
            />

            <small
              class="text-danger"
              *ngIf="confirmPassword && dto.password !== confirmPassword"
            >
              Password does not match
            </small>

            <small
              class="text-success"
              *ngIf="confirmPassword && dto.password === confirmPassword"
            >
              Password matched
            </small>
          </div>
        </div>

        <div class="mt-4">
          <button class="btn btn-success" type="submit">Register</button>
          <button class="btn btn-secondary" type="button" (click)="resetForm()">Reset</button>
        </div>
      </form>
    </div>
  </div>
</div>
