<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4>Login</h4>

</div>

<div class="card-body">

<form (ngSubmit)="login()">

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
type="email"
[(ngModel)]="loginData.email"
name="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
class="form-control"
type="password"
[(ngModel)]="loginData.password"
name="password"
required>

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

</div>

</div>

</div>

</div>

</div>
