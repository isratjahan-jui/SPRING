<div class="container mt-4">
  <h2>Customers</h2>
  @if (loading) {
    <p class="text-muted">Loading...</p>
  } @else if (customers.length === 0) {
    <p class="text-muted">No customers registered yet.</p>
  } @else {
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Gender</th>
        </tr>
      </thead>
      <tbody>
        @for (c of customers; track c.id) {
          <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.customerName || c.name }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.phone }}</td>
            <td>{{ c.address }}</td>
            <td>{{ c.gender }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
