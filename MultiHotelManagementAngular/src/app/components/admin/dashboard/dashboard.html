<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Admin Dashboard</h1>
    <p>Welcome, {{ userName() }}</p>
  </div>

  @if (loading) {
    <p class="text-muted">Loading stats...</p>
  }

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🏨</div>
      <div class="stat-info">
        <h3>Approved Hotels</h3>
        <p class="stat-value">{{ approvedHotelCount }}</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <h3>Total Owners</h3>
        <p class="stat-value">{{ ownerCount }}</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧑‍🤝‍🧑</div>
      <div class="stat-info">
        <h3>Total Customers</h3>
        <p class="stat-value">{{ customerCount }}</p>
      </div>
    </div>
  </div>

  <div class="quick-actions">
    <h2>Quick Actions</h2>
    <div class="actions-grid">
      <a routerLink="/admin/hotels/manage" class="action-btn">Manage Hotels</a>
      <a routerLink="/admin/owners" class="action-btn">Manage Owners</a>
      <a routerLink="/admin/customers" class="action-btn">Manage Customers</a>
      <a routerLink="/admin/commissions" class="action-btn">Commissions</a>
    </div>
  </div>
</div>
