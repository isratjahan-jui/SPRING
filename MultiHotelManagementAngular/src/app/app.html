@if (showPublicLayout()) {
  <app-header></app-header>
  <router-outlet></router-outlet>
  @if (showFooter()) {
    <app-footer></app-footer>
  }
} @else {
  <div class="d-flex">
    <app-sidebar></app-sidebar>
    <div class="main-wrap">
      <app-header></app-header>
      <div class="page-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
}
